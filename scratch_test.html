<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; }
  .viewport {
    position: relative;
    width: 100%;
    height: 100vh;
    padding: 0 50px;
    background: blue;
    box-sizing: border-box;
  }
  .capsule {
    position: absolute;
    inset: 0;
    background: red;
  }
</style>
</head>
<body>
  <div class="viewport">
    <div class="capsule"></div>
  </div>
</body>
</html>
